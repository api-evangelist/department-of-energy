aid: department-of-energy
name: Department of Energy
description: >-
  The U.S. Department of Energy (DOE) provides extensive open data and APIs across its national laboratories and program
  offices. Notable APIs are published by the Energy Information Administration (EIA) for energy statistics, the Office
  of Scientific and Technical Information (OSTI) for research and publications, the National Renewable Energy Laboratory
  (NREL, rebranding as NLR) developer network for renewables and alternative fuels, and the Buildings Performance
  Database (BPD).
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Buildings
  - Electricity
  - Energy
  - Federal Government
  - Open Data
  - Renewables
  - Research
  - Solar
  - Statistics
url: https://raw.githubusercontent.com/api-evangelist/department-of-energy/refs/heads/main/apis.yml
